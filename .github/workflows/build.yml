name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project MusicPauser.xcodeproj \
            -scheme MusicPauser \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            build

      - name: Zip app bundle
        run: |
          cd build/Build/Products/Release
          zip -r MusicPauser.zip MusicPauser.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicPauser
          path: build/Build/Products/Release/MusicPauser.zip
          retention-days: 30
